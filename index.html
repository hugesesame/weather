<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skycast</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1220; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.08);
      --accent: #4fc3f7; --accent2: #81d4fa; --text: #e8f4fd; --muted: #7a9ab5;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; }
    #app {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px 60px;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(79,195,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(129,212,250,0.08) 0%, transparent 60%),
        var(--bg);
    }

    /* Header */
    header { width:100%; max-width:900px; display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
    .logo { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); }
    .search-wrap { display:flex; gap:8px; }
    .search-wrap input { background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.9rem; padding:8px 14px; width:200px; outline:none; transition:border-color 0.2s; }
    .search-wrap input::placeholder { color:var(--muted); }
    .search-wrap input:focus { border-color:var(--accent); }
    .search-wrap button { background:var(--accent); border:none; border-radius:6px; color:#0b1220; cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:0.85rem; font-weight:700; letter-spacing:0.1em; padding:8px 16px; text-transform:uppercase; transition:background 0.2s; }
    .search-wrap button:hover { background:var(--accent2); }
    #geoBtn { padding:8px 12px; font-size:1rem; line-height:1; }
    #geoBtn:disabled { opacity:0.35; cursor:not-allowed; }

    /* Touch hint */
    .touch-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase; opacity: 0.5; pointer-events: none;
      transition: opacity 0.5s;
    }
    .touch-hint.hidden { opacity: 0; }

    /* Main card */
    .main-card { width:100%; max-width:900px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; margin-bottom:16px; display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center; animation:fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .name-clock { display:flex; align-items:baseline; gap:20px; margin-bottom:4px; }
    .location-name { font-family:'Barlow Condensed',sans-serif; font-size:clamp(2rem,5vw,3.2rem); font-weight:700; letter-spacing:0.02em; line-height:1; }
    .live-clock { font-family:'Barlow Condensed',sans-serif; font-size:clamp(1.4rem,3vw,2rem); font-weight:300; color:var(--accent); letter-spacing:0.06em; line-height:1; }
    .clock-colon { color:var(--muted); animation:blink 1s step-start infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .location-meta { font-size:0.85rem; color:var(--muted); letter-spacing:0.05em; margin-bottom:28px; }
    .temp-wrap { display:flex; align-items:flex-end; gap:12px; margin-bottom:8px; }
    .temp-main { font-family:'Barlow Condensed',sans-serif; font-size:clamp(4rem,12vw,6rem); font-weight:300; line-height:1; color:var(--accent); }
    .temp-unit { font-size:1.8rem; color:var(--muted); margin-bottom:8px; }
    .condition { font-size:1.05rem; color:var(--muted); margin-bottom:28px; letter-spacing:0.04em; }
    .stats-row { display:flex; gap:32px; flex-wrap:wrap; }
    .stat { display:flex; flex-direction:column; gap:2px; }
    .stat-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); }
    .stat-value { font-family:'Barlow Condensed',sans-serif; font-size:1.3rem; font-weight:400; }
    .weather-icon { font-size:clamp(4rem,10vw,6rem); filter:drop-shadow(0 0 24px rgba(79,195,247,0.3)); animation:float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    /* Sun row */
    .sun-row { width:100%; max-width:900px; display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; animation:fadeUp 0.5s 0.1s ease both; }
    .sun-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 28px; display:flex; align-items:center; gap:16px; }
    .sun-icon { font-size:2rem; }
    .sun-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-bottom:2px; }
    .sun-time { font-family:'Barlow Condensed',sans-serif; font-size:1.6rem; font-weight:400; }

    /* Forecast */
    .forecast-section { width:100%; max-width:900px; animation:fadeUp 0.5s 0.2s ease both; }
    .section-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.16em; color:var(--muted); margin-bottom:12px; }
    .forecast-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .forecast-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 16px; text-align:center; transition:border-color 0.2s,transform 0.2s; }
    .forecast-card:hover { border-color:rgba(79,195,247,0.35); transform:translateY(-3px); }
    .fc-day { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; }
    .fc-icon { font-size:2rem; margin-bottom:10px; }
    .fc-temps { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; }
    .fc-hi { color:var(--text); }
    .fc-lo { color:var(--muted); margin-left:6px; }
    .fc-desc { font-size:0.75rem; color:var(--muted); margin-top:6px; }
    .demo-note { width:100%; max-width:900px; margin-top:20px; text-align:center; font-size:0.78rem; color:var(--muted); letter-spacing:0.05em; opacity:0.7; }

    @media (max-width:640px) {
      .main-card { grid-template-columns:1fr; padding:28px 20px; }
      .weather-icon { display:none; }
      .forecast-grid { grid-template-columns:repeat(2,1fr); }
      .search-wrap input { width:120px; }
      .live-clock { font-size:1.2rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Skycast</div>
    <div class="search-wrap">
      <input type="text" id="cityInput" placeholder="City name…" />
      <button onclick="searchCity()">Search</button>
      <button id="geoBtn" onclick="searchHere()" title="Use my location">📍</button>
    </div>
  </header>
  <div id="content"></div>
</div>
<div class="touch-hint" id="touchHint">Tap anywhere to go fullscreen</div>

<script>
/* ═══ Open-Meteo API 版 ═══════════════════════════════════════════
   ジオコーディング + 気象予報。APIキー不要・無料 (open-meteo.com)
   世界中の任意の都市名で検索できる。                              */

// WMO天気コード → アイコン/説明
const WMO = {
  0:['☀️','Clear'],1:['🌤️','Mainly Clear'],2:['⛅','Partly Cloudy'],3:['☁️','Overcast'],
  45:['🌫️','Fog'],48:['🌫️','Rime Fog'],
  51:['🌦️','Light Drizzle'],53:['🌦️','Drizzle'],55:['🌧️','Dense Drizzle'],
  56:['🌧️','Freezing Drizzle'],57:['🌧️','Freezing Drizzle'],
  61:['🌧️','Light Rain'],63:['🌧️','Rain'],65:['🌧️','Heavy Rain'],
  66:['🌧️','Freezing Rain'],67:['🌧️','Freezing Rain'],
  71:['🌨️','Light Snow'],73:['🌨️','Snow'],75:['❄️','Heavy Snow'],77:['🌨️','Snow Grains'],
  80:['🌦️','Rain Showers'],81:['🌧️','Rain Showers'],82:['⛈️','Violent Showers'],
  85:['🌨️','Snow Showers'],86:['❄️','Snow Showers'],
  95:['⛈️','Thunderstorm'],96:['⛈️','Thunderstorm w/ Hail'],99:['⛈️','Thunderstorm w/ Hail'],
};
const wmo = c => WMO[c] || ['🌡️','—'];

let cityTZ = null;   // 表示中都市のIANAタイムゾーン（時計用）

function setNote(msg, isError){
  const note = document.querySelector('.demo-note');
  if (note){ note.style.color = isError ? '#ef9a9a' : ''; note.textContent = msg; }
}

// 座標 → 天気 + 逆ジオコーディングで地名（BigDataCloud: キー不要・無料）
async function fetchByCoords(lat, lon){
  const wxUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset` +
    `&timezone=auto&forecast_days=5`;
  const revUrl = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`;
  const [wx, rev] = await Promise.all([
    (await fetch(wxUrl)).json(),
    fetch(revUrl).then(r=>r.json()).catch(()=>null),   // 地名が引けなくても天気は出す
  ]);
  const name = rev && (rev.city || rev.locality) || 'Current Location';
  const admin = rev && rev.principalSubdivision || '';
  const country = rev && rev.countryName || '';
  return buildModel(wx, { name, admin: admin !== name ? admin : '', country });
}

function searchHere(){
  const btn = document.getElementById('geoBtn');
  if (!navigator.geolocation) { setNote('Geolocation is not supported by this browser.', true); return; }
  if (!window.isSecureContext) { setNote('Location requires HTTPS (or localhost). Use city search instead.', true); return; }
  btn.disabled = true;
  setNote('Locating…');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      try { render(await fetchByCoords(pos.coords.latitude, pos.coords.longitude)); }
      catch(e){ setNote('Could not load weather for your location.', true); }
      finally { btn.disabled = false; }
    },
    err => {
      btn.disabled = false;
      setNote(err.code === err.PERMISSION_DENIED
        ? 'Location permission denied. Use city search instead.'
        : 'Could not determine your location.', true);
    },
    { timeout: 10000, maximumAge: 300000 }
  );
}

async function fetchCity(query){
  // 1) ジオコーディング（日本語名もOK: Open-Meteoは多言語対応）
  const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`;
  const geo = await (await fetch(geoUrl)).json();
  if (!geo.results || geo.results.length === 0) throw new Error('CITY_NOT_FOUND');
  const g = geo.results[0];

  // 2) 気象データ（都市のタイムゾーンで返してもらう）
  const wxUrl = `https://api.open-meteo.com/v1/forecast?latitude=${g.latitude}&longitude=${g.longitude}` +
    `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset` +
    `&timezone=auto&forecast_days=5`;
  const wx = await (await fetch(wxUrl)).json();

  return buildModel(wx, {
    name: g.name,
    country: g.country || '',
    admin: g.admin1 && g.admin1 !== g.name ? g.admin1 : '',
  });
}

// APIレスポンス → 表示モデル（都市検索・座標検索の共通処理）
function buildModel(wx, place){
  const cur = wx.current, dy = wx.daily;
  const [icon, condition] = wmo(cur.weather_code);
  const fmtTime = iso => {
    const [h, m] = iso.split('T')[1].split(':');
    const hh = parseInt(h,10);
    const ampm = hh >= 12 ? 'PM' : 'AM';
    return `${((hh+11)%12)+1}:${m} ${ampm}`;
  };
  const dayName = (iso, i) => i === 1 ? 'Tomorrow'
    : new Date(iso+'T12:00').toLocaleDateString('en-US',{weekday:'short'});

  return {
    ...place,
    tz: wx.timezone,
    temp: Math.round(cur.temperature_2m),
    feels: Math.round(cur.apparent_temperature),
    humidity: Math.round(cur.relative_humidity_2m),
    wind: Math.round(cur.wind_speed_10m),
    hi: Math.round(dy.temperature_2m_max[0]),
    lo: Math.round(dy.temperature_2m_min[0]),
    icon, condition,
    sunrise: fmtTime(dy.sunrise[0]),
    sunset:  fmtTime(dy.sunset[0]),
    forecast: [1,2,3,4].map(i => {
      const [fi, fd] = wmo(dy.weather_code[i]);
      return { day: dayName(dy.time[i], i), icon: fi,
               hi: Math.round(dy.temperature_2m_max[i]), lo: Math.round(dy.temperature_2m_min[i]), desc: fd };
    }),
  };
}

function render(d) {
  cityTZ = d.tz || null;
  const today = new Date().toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', timeZone: cityTZ || undefined });
  const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fc = d.forecast.map(f=>`
    <div class="forecast-card">
      <div class="fc-day">${esc(f.day)}</div>
      <div class="fc-icon">${f.icon}</div>
      <div class="fc-temps"><span class="fc-hi">${f.hi}°</span><span class="fc-lo">${f.lo}°</span></div>
      <div class="fc-desc">${esc(f.desc)}</div>
    </div>`).join('');
  const meta = [d.admin, d.country].filter(Boolean).join(', ');

  document.getElementById('content').innerHTML = `
    <div class="main-card">
      <div>
        <div class="name-clock">
          <div class="location-name">${esc(d.name)}</div>
          <div class="live-clock" id="clock"></div>
        </div>
        <div class="location-meta">${esc(meta)} &nbsp;·&nbsp; ${today}</div>
        <div class="temp-wrap">
          <div class="temp-main">${d.temp}</div>
          <div class="temp-unit">°C</div>
        </div>
        <div class="condition">${d.icon} ${esc(d.condition)} &nbsp;·&nbsp; Feels like ${d.feels}°C</div>
        <div class="stats-row">
          <div class="stat"><span class="stat-label">Humidity</span><span class="stat-value">${d.humidity}%</span></div>
          <div class="stat"><span class="stat-label">Wind</span><span class="stat-value">${d.wind} km/h</span></div>
          <div class="stat"><span class="stat-label">High / Low</span><span class="stat-value">${d.hi}° / ${d.lo}°</span></div>
        </div>
      </div>
      <div class="weather-icon">${d.icon}</div>
    </div>
    <div class="sun-row">
      <div class="sun-card"><div class="sun-icon">🌅</div><div><div class="sun-label">Sunrise</div><div class="sun-time">${d.sunrise}</div></div></div>
      <div class="sun-card"><div class="sun-icon">🌇</div><div><div class="sun-label">Sunset</div><div class="sun-time">${d.sunset}</div></div></div>
    </div>
    <div class="forecast-section">
      <div class="section-title">4-Day Forecast</div>
      <div class="forecast-grid">${fc}</div>
    </div>
    <p class="demo-note">Weather by Open-Meteo &nbsp;·&nbsp; Search any city worldwide</p>`;

  startClock();
}

let clockTimer = null;
function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  function tick() {
    const el = document.getElementById('clock');
    if (!el) return;
    // 表示中の都市のローカル時刻（端末の時刻ではなく）
    const parts = new Intl.DateTimeFormat('en-GB',
      { hour:'2-digit', minute:'2-digit', hour12:false, timeZone: cityTZ || undefined })
      .format(new Date()).split(':');
    el.innerHTML = `${parts[0]}<span class="clock-colon">:</span>${parts[1]}`;
  }
  tick();
  clockTimer = setInterval(tick, 1000);
}

let searching = false;
async function searchCity() {
  const q = document.getElementById('cityInput').value.trim();
  if (!q || searching) return;
  searching = true;
  setNote('Searching…');
  try {
    const d = await fetchCity(q);
    render(d);
  } catch (e) {
    if (e.message === 'CITY_NOT_FOUND') setNote(`"${q}" not found. Try another spelling.`, true);
    else setNote('Network error. Check your connection and try again.', true);
  } finally {
    searching = false;
  }
}

// ── Fullscreen on touch / click (ignore input & button taps) ──
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

document.getElementById('app').addEventListener('click', function(e) {
  const tag = e.target.tagName.toLowerCase();
  if (tag === 'input' || tag === 'button') return;
  toggleFullscreen();
});

// Hide hint after first interaction or after 4s
const hint = document.getElementById('touchHint');
setTimeout(() => hint.classList.add('hidden'), 4000);
document.getElementById('app').addEventListener('click', () => hint.classList.add('hidden'), { once: true });

document.getElementById('cityInput').addEventListener('keydown', e => { if(e.key==='Enter') searchCity(); });

// 起動時: HTTPS環境で位置情報の権限が既に許可済みなら現在地、それ以外は東京
(async () => {
  const bootTokyo = async () => {
    try { render(await fetchCity('Tokyo')); }
    catch(e){ setNote('Could not load weather. Check connection and search above.', true); }
  };
  try {
    if (window.isSecureContext && navigator.permissions) {
      const p = await navigator.permissions.query({ name: 'geolocation' });
      if (p.state === 'granted') {   // 権限ダイアログを起動時に出さない（granted済みのみ自動使用）
        navigator.geolocation.getCurrentPosition(
          async pos => {
            try { render(await fetchByCoords(pos.coords.latitude, pos.coords.longitude)); }
            catch(e){ bootTokyo(); }
          },
          bootTokyo, { timeout: 5000, maximumAge: 300000 });
        return;
      }
    }
  } catch(e){ /* permissions API非対応環境 */ }
  bootTokyo();
})();
</script>
</body>
</html>
